<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Airlock — Pending Review</title>
  <style>
    /* ===== Base Tokens ===== */
    :root {
      --bg-darkest: #0d1017;
      --bg-page: #12161f;
      --bg-input: #161b28;
      --bg-panel: #1a1f2e;
      --bg-card: #1e2436;
      --bg-card-hover: #242b3d;
      --text-primary: #e8eaed;
      --text-secondary: #9aa0a6;
      --text-muted: #6b7280;
      --accent-blue: #0091ea;
      --accent-blue-dim: rgba(0,145,234,0.15);
      --green: #4caf50;
      --green-dim: rgba(76,175,80,0.15);
      --amber: #ff9800;
      --amber-dim: rgba(255,152,0,0.12);
      --red: #f44336;
      --red-dim: rgba(244,67,54,0.12);
      --teal: #26a69a;
      --teal-dim: rgba(38,166,154,0.12);
      --purple: #7b1fa2;
      --purple-dim: rgba(123,31,162,0.12);
      --border: #2a3040;
      --border-light: #333b4f;
      --mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
      --radius-sm: 4px;
      --radius-md: 6px;
      --radius-lg: 10px;
    }

    html[data-theme="airlock"] {
      --bg-darkest: #080a0f;
      --bg-page: #0B0E14;
      --bg-input: #0F1219;
      --bg-panel: #0F1219;
      --bg-card: #151923;
      --bg-card-hover: #1a2030;
      --border: #1E2330;
      --border-light: #2a3040;
      --accent-blue: #00D1FF;
      --accent-blue-dim: rgba(0,209,255,0.12);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
    }

    /* ===== Layout ===== */
    .review-layout {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ===== Toolbar ===== */
    .review-toolbar {
      display: flex;
      align-items: center;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
      flex-shrink: 0;
    }

    .toolbar-title {
      font-size: 14px;
      font-weight: 700;
    }

    .toolbar-sep {
      width: 1px;
      height: 18px;
      background: var(--border);
    }

    .toolbar-filter {
      display: flex;
      gap: 6px;
    }

    .filter-pill {
      padding: 4px 10px;
      font-size: 10px;
      font-weight: 600;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.12s;
    }

    .filter-pill:hover {
      background: var(--bg-card);
      color: var(--text-secondary);
    }

    .filter-pill.active {
      background: var(--accent-blue-dim);
      border-color: var(--accent-blue);
      color: var(--accent-blue);
    }

    .toolbar-spacer { flex: 1; }

    .toolbar-badge {
      font-size: 10px;
      font-weight: 700;
      font-family: var(--mono);
      color: var(--text-muted);
      background: var(--bg-card);
      padding: 3px 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    /* ===== Cards Container ===== */
    .review-cards {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .review-cards::-webkit-scrollbar {
      width: 6px;
    }
    .review-cards::-webkit-scrollbar-track {
      background: transparent;
    }
    .review-cards::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    /* ===== Review Card ===== */
    .review-card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px 18px;
      transition: all 0.15s;
    }

    .review-card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-light);
    }

    /* Left: severity + title block */
    .review-card-main {
      flex: 1;
      min-width: 0;
    }

    .review-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .review-severity-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .review-severity-dot.info { background: var(--accent-blue); }
    .review-severity-dot.warning { background: var(--amber); }
    .review-severity-dot.blocker { background: var(--red); }

    .review-card-title {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .review-card-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .review-module-badge {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .review-module-badge.contracts {
      background: var(--accent-blue-dim);
      color: var(--accent-blue);
    }
    .review-module-badge.crm {
      background: var(--teal-dim);
      color: var(--teal);
    }
    .review-module-badge.tasks {
      background: var(--purple-dim);
      color: var(--purple);
    }

    .review-vault {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* Reviewer section */
    .review-reviewer {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-shrink: 0;
      min-width: 130px;
    }

    .review-avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      font-size: 9px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      flex-shrink: 0;
    }

    .review-reviewer-name {
      font-size: 11px;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    /* Due countdown */
    .review-due {
      font-size: 11px;
      font-family: var(--mono);
      font-weight: 600;
      min-width: 70px;
      text-align: right;
      flex-shrink: 0;
    }

    .review-due.soon { color: var(--amber); }
    .review-due.normal { color: var(--text-muted); }
    .review-due.overdue { color: var(--red); }

    /* Divider between info and actions */
    .review-card-divider {
      width: 1px;
      height: 36px;
      background: var(--border);
      flex-shrink: 0;
    }

    /* Action buttons */
    .review-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .review-btn {
      padding: 6px 16px;
      font-size: 11px;
      font-weight: 600;
      border-radius: var(--radius-md);
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .review-btn-approve {
      background: var(--green-dim);
      color: var(--green);
      border-color: rgba(76,175,80,0.25);
    }

    .review-btn-approve:hover {
      background: var(--green);
      color: #fff;
      border-color: var(--green);
      box-shadow: 0 0 12px rgba(76,175,80,0.25);
    }

    .review-btn-return {
      background: var(--amber-dim);
      color: var(--amber);
      border-color: rgba(255,152,0,0.2);
    }

    .review-btn-return:hover {
      background: var(--amber);
      color: #fff;
      border-color: var(--amber);
      box-shadow: 0 0 12px rgba(255,152,0,0.25);
    }

    /* ===== Footer ===== */
    .review-footer {
      display: flex;
      align-items: center;
      padding: 8px 20px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      font-size: 10px;
      color: var(--text-muted);
    }

    .footer-text {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .footer-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--purple);
    }

    /* ===== Toast ===== */
    .toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      padding: 10px 18px;
      background: var(--bg-panel);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      font-size: 12px;
      color: var(--text-primary);
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      animation: toastIn 0.2s ease-out, toastOut 0.25s ease-in 1.5s forwards;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toast-icon {
      font-size: 14px;
    }

    .toast.approve {
      border-left: 3px solid var(--green);
    }

    .toast.return-action {
      border-left: 3px solid var(--amber);
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes toastOut {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: 0; transform: translateY(-6px); }
    }

    /* ===== Empty state ===== */
    .review-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text-muted);
    }

    .review-empty-icon {
      font-size: 32px;
      opacity: 0.4;
      margin-bottom: 4px;
    }

    .review-empty-text {
      font-size: 13px;
    }

    .review-empty-sub {
      font-size: 11px;
      color: var(--text-muted);
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="review-layout">
    <!-- Toolbar -->
    <div class="review-toolbar">
      <span class="toolbar-title">Pending Review</span>
      <span class="toolbar-sep"></span>
      <div class="toolbar-filter">
        <button class="filter-pill active" data-filter="all">All</button>
        <button class="filter-pill" data-filter="contracts">Contracts</button>
        <button class="filter-pill" data-filter="crm">CRM</button>
      </div>
      <span class="toolbar-spacer"></span>
      <span class="toolbar-badge" id="itemCount">3 items</span>
    </div>

    <!-- Cards -->
    <div class="review-cards" id="reviewCards"></div>

    <!-- Footer -->
    <div class="review-footer">
      <div class="footer-text">
        <span class="footer-dot"></span>
        <span id="footerText">3 tasks pending review</span>
      </div>
    </div>
  </div>

  <!-- Toasts -->
  <div class="toast-container" id="toastContainer"></div>

  <script>
    // ===== People =====
    var PEOPLE = {
      ana:     { name: 'Ana Chen',      color: '#0091ea' },
      daniele: { name: 'Daniele Leoni', color: '#e91e63' },
      marcus:  { name: 'Marcus Webb',   color: '#26a69a' },
      sarah:   { name: 'Sarah Chen',    color: '#7b1fa2' },
      james:   { name: 'James Liu',     color: '#ff9800' }
    };

    function getInitials(name) {
      return name.split(' ').map(function(w) { return w[0]; }).join('');
    }

    // ===== Review Tasks =====
    var REVIEW_TASKS = [
      {
        id: 't12',
        title: 'Patch #11 approval for slowhands distribution',
        module: 'contracts',
        vault: 'slowhands',
        severity: 'info',
        reviewer: 'james',
        due: '2h 15m',
        dueClass: 'soon'
      },
      {
        id: 't13',
        title: 'Review Sony Q1 extraction results',
        module: 'contracts',
        vault: 'sony-dist-2024',
        severity: 'info',
        reviewer: 'sarah',
        due: '3d',
        dueClass: 'normal'
      },
      {
        id: 't14',
        title: 'Atlantic Distribution 2026 gate review',
        module: 'contracts',
        vault: 'atlantic-dist',
        severity: 'info',
        reviewer: 'james',
        due: '1d',
        dueClass: 'soon'
      }
    ];

    var currentFilter = 'all';

    // ===== Rendering =====
    function renderCards() {
      var container = document.getElementById('reviewCards');
      var filtered = currentFilter === 'all'
        ? REVIEW_TASKS
        : REVIEW_TASKS.filter(function(t) { return t.module === currentFilter; });

      if (filtered.length === 0) {
        container.innerHTML =
          '<div class="review-empty">' +
          '<div class="review-empty-icon">&#9745;</div>' +
          '<div class="review-empty-text">No tasks pending review</div>' +
          '<div class="review-empty-sub">All caught up for this filter</div>' +
          '</div>';
        updateCounts(0);
        return;
      }

      var html = '';
      filtered.forEach(function(task) {
        var p = PEOPLE[task.reviewer];
        var initials = getInitials(p.name);

        html += '<div class="review-card" data-id="' + task.id + '">';

        // Main content
        html += '<div class="review-card-main">';
        html += '<div class="review-card-header">';
        html += '<div class="review-severity-dot ' + task.severity + '"></div>';
        html += '<div class="review-card-title">' + task.title + '</div>';
        html += '</div>';
        html += '<div class="review-card-meta">';
        html += '<span class="review-module-badge ' + task.module + '">' + task.module + '</span>';
        html += '<span class="review-vault">' + task.vault + '</span>';
        html += '</div>';
        html += '</div>';

        // Reviewer
        html += '<div class="review-reviewer">';
        html += '<div class="review-avatar" style="background:' + p.color + '">' + initials + '</div>';
        html += '<span class="review-reviewer-name">' + p.name + '</span>';
        html += '</div>';

        // Due
        html += '<div class="review-due ' + task.dueClass + '">' + task.due + '</div>';

        // Divider
        html += '<div class="review-card-divider"></div>';

        // Actions
        html += '<div class="review-actions">';
        html += '<button class="review-btn review-btn-approve" onclick="handleAction(\'' + task.id + '\',\'approve\')">Approve</button>';
        html += '<button class="review-btn review-btn-return" onclick="handleAction(\'' + task.id + '\',\'return\')">Return</button>';
        html += '</div>';

        html += '</div>';
      });

      container.innerHTML = html;
      updateCounts(filtered.length);
    }

    function updateCounts(count) {
      var noun = count === 1 ? 'item' : 'items';
      document.getElementById('itemCount').textContent = count + ' ' + noun;
      document.getElementById('footerText').textContent = count + ' task' + (count !== 1 ? 's' : '') + ' pending review';
    }

    // ===== Actions =====
    function handleAction(taskId, action) {
      var label = action === 'approve' ? 'Approved' : 'Returned';
      var cls = action === 'approve' ? 'approve' : 'return-action';
      var icon = action === 'approve' ? '&#10003;' : '&#8617;';
      showToast(icon + ' ' + label + ' \u2014 Action recorded (demo)', cls);
    }

    // ===== Toast =====
    function showToast(message, cls) {
      var container = document.getElementById('toastContainer');
      var toast = document.createElement('div');
      toast.className = 'toast ' + cls;
      toast.innerHTML = message;
      container.appendChild(toast);

      setTimeout(function() {
        if (toast.parentNode) toast.parentNode.removeChild(toast);
      }, 1800);
    }

    // ===== Filters =====
    document.querySelectorAll('.filter-pill').forEach(function(pill) {
      pill.addEventListener('click', function() {
        document.querySelectorAll('.filter-pill').forEach(function(p) {
          p.classList.remove('active');
        });
        pill.classList.add('active');
        currentFilter = pill.getAttribute('data-filter');
        renderCards();
      });
    });

    // ===== Theme =====
    var params = new URLSearchParams(window.location.search);
    if (params.get('theme') === 'airlock') {
      document.documentElement.setAttribute('data-theme', 'airlock');
    }

    // ===== Init =====
    renderCards();
  </script>
</body>
</html>
