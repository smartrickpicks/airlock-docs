<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Airlock — Tasks Kanban Board</title>
  <style>
    /* ===== Base Tokens ===== */
    :root {
      --bg-darkest: #0d1017;
      --bg-page: #12161f;
      --bg-input: #161b28;
      --bg-panel: #1a1f2e;
      --bg-card: #1e2436;
      --bg-card-hover: #242b3d;
      --text-primary: #e8eaed;
      --text-secondary: #9aa0a6;
      --text-muted: #6b7280;
      --accent-blue: #0091ea;
      --accent-blue-dim: rgba(0,145,234,0.15);
      --green: #4caf50;
      --green-dim: rgba(76,175,80,0.15);
      --amber: #ff9800;
      --amber-dim: rgba(255,152,0,0.12);
      --red: #f44336;
      --red-dim: rgba(244,67,54,0.12);
      --teal: #26a69a;
      --teal-dim: rgba(38,166,154,0.12);
      --purple: #7b1fa2;
      --purple-dim: rgba(123,31,162,0.12);
      --border: #2a3040;
      --border-light: #333b4f;
      --mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
      --radius-sm: 4px;
      --radius-md: 6px;
      --radius-lg: 10px;
    }

    html[data-theme="airlock"] {
      --bg-darkest: #080a0f;
      --bg-page: #0B0E14;
      --bg-input: #0F1219;
      --bg-panel: #0F1219;
      --bg-card: #151923;
      --bg-card-hover: #1a2030;
      --border: #1E2330;
      --border-light: #2a3040;
      --accent-blue: #00D1FF;
      --accent-blue-dim: rgba(0,209,255,0.12);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
    }

    /* ===== Layout ===== */
    .tasks-layout {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Toolbar */
    .tasks-toolbar {
      display: flex;
      align-items: center;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
      flex-shrink: 0;
    }

    .toolbar-title {
      font-size: 14px;
      font-weight: 700;
    }

    .toolbar-sep {
      width: 1px;
      height: 18px;
      background: var(--border);
    }

    .toolbar-filter {
      display: flex;
      gap: 6px;
    }

    .filter-pill {
      padding: 4px 10px;
      font-size: 10px;
      font-weight: 600;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.12s;
    }

    .filter-pill:hover {
      background: var(--bg-card);
      color: var(--text-secondary);
    }

    .filter-pill.active {
      background: var(--accent-blue-dim);
      border-color: var(--accent-blue);
      color: var(--accent-blue);
    }

    .toolbar-spacer { flex: 1; }

    .toolbar-group-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .toolbar-select {
      padding: 4px 8px;
      font-size: 11px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      outline: none;
    }

    .toolbar-btn {
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 600;
      background: var(--accent-blue);
      border: none;
      border-radius: var(--radius-sm);
      color: white;
      cursor: pointer;
    }

    .toolbar-btn:hover {
      opacity: 0.9;
    }

    /* ===== Kanban Board ===== */
    .kanban-board {
      flex: 1;
      display: flex;
      gap: 16px;
      padding: 16px 20px;
      overflow-x: auto;
      overflow-y: hidden;
    }

    .kanban-column {
      width: 280px;
      min-width: 280px;
      display: flex;
      flex-direction: column;
      background: var(--bg-panel);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .column-header {
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .column-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .column-dot.open { background: var(--accent-blue); }
    .column-dot.progress { background: var(--amber); }
    .column-dot.review { background: var(--purple); }
    .column-dot.resolved { background: var(--green); }

    .column-name {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      flex: 1;
    }

    .column-count {
      font-size: 10px;
      font-weight: 700;
      font-family: var(--mono);
      color: var(--text-muted);
      background: var(--bg-card);
      padding: 1px 6px;
      border-radius: 8px;
    }

    .column-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .column-body:empty::after {
      content: 'No tasks';
      display: block;
      text-align: center;
      padding: 24px;
      color: var(--text-muted);
      font-size: 11px;
    }

    /* ===== Task Card ===== */
    .task-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 10px 12px;
      cursor: grab;
      transition: all 0.12s;
    }

    .task-card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-light);
    }

    .task-card.dragging {
      opacity: 0.6;
      transform: rotate(2deg);
    }

    .task-card-header {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      margin-bottom: 6px;
    }

    .task-severity-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
    }

    .task-severity-dot.blocker { background: var(--red); }
    .task-severity-dot.warning { background: var(--amber); }
    .task-severity-dot.info { background: var(--accent-blue); }

    .task-title {
      font-size: 12px;
      font-weight: 600;
      line-height: 1.3;
      flex: 1;
    }

    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }

    .task-module-badge {
      font-size: 9px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .task-module-badge.contracts { background: var(--accent-blue-dim); color: var(--accent-blue); }
    .task-module-badge.crm { background: var(--teal-dim); color: var(--teal); }
    .task-module-badge.tasks { background: var(--purple-dim); color: var(--purple); }
    .task-module-badge.calendar { background: var(--amber-dim); color: var(--amber); }

    .task-vault {
      font-size: 10px;
      color: var(--text-muted);
    }

    .task-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .task-assignee {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .task-avatar {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      font-size: 8px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .task-assignee-name {
      font-size: 10px;
      color: var(--text-secondary);
    }

    .task-due {
      font-size: 10px;
      font-family: var(--mono);
      font-weight: 600;
    }

    .task-due.overdue { color: var(--red); }
    .task-due.soon { color: var(--amber); }
    .task-due.normal { color: var(--text-muted); }

    /* Quick add row */
    .quick-add {
      padding: 8px;
      flex-shrink: 0;
    }

    .quick-add-input {
      width: 100%;
      padding: 7px 10px;
      background: var(--bg-input);
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 11px;
      outline: none;
    }

    .quick-add-input:focus {
      border-color: var(--accent-blue);
    }

    .quick-add-input::placeholder {
      color: var(--text-muted);
    }

    /* Drop target indicator */
    .kanban-column.drag-over .column-body {
      background: var(--accent-blue-dim);
      border-radius: var(--radius-md);
    }

    /* ===== Summary strip at bottom ===== */
    .tasks-summary {
      display: flex;
      align-items: center;
      padding: 8px 20px;
      border-top: 1px solid var(--border);
      gap: 16px;
      flex-shrink: 0;
      font-size: 10px;
      color: var(--text-muted);
    }

    .summary-stat {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .summary-num {
      font-weight: 700;
      font-family: var(--mono);
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="tasks-layout">
    <!-- Toolbar -->
    <div class="tasks-toolbar">
      <span class="toolbar-title">Kanban Board</span>
      <span class="toolbar-sep"></span>
      <div class="toolbar-filter">
        <button class="filter-pill active" onclick="setFilter('all',this)">All</button>
        <button class="filter-pill" onclick="setFilter('contracts',this)">Contracts</button>
        <button class="filter-pill" onclick="setFilter('crm',this)">CRM</button>
        <button class="filter-pill" onclick="setFilter('calendar',this)">Calendar</button>
        <button class="filter-pill" onclick="setFilter('tasks',this)">Manual</button>
      </div>
      <span class="toolbar-spacer"></span>
      <span class="toolbar-group-label">Group:</span>
      <select class="toolbar-select" onchange="regroup(this.value)">
        <option value="status">By Status</option>
        <option value="module">By Module</option>
        <option value="assignee">By Assignee</option>
      </select>
      <button class="toolbar-btn" onclick="alert('New Task dialog (TBD)')">+ New Task</button>
    </div>

    <!-- Kanban Board -->
    <div class="kanban-board" id="kanbanBoard"></div>

    <!-- Summary -->
    <div class="tasks-summary">
      <div class="summary-stat"><span class="summary-num" id="totalOpen">0</span> open</div>
      <div class="summary-stat"><span class="summary-num" id="totalProgress">0</span> in progress</div>
      <div class="summary-stat"><span class="summary-num" id="totalReview">0</span> in review</div>
      <div class="summary-stat"><span class="summary-num" id="totalResolved">0</span> resolved</div>
      <div style="flex:1"></div>
      <div class="summary-stat"><span class="summary-num" id="totalOverdue" style="color:var(--red)">0</span> overdue</div>
    </div>
  </div>

  <script>
    // ===== Task Data =====
    var COLORS = ['#0091ea','#26a69a','#7b1fa2','#f44336','#ff9800','#4caf50','#e91e63','#3f51b5'];

    var PEOPLE = [
      { id: 'ana', name: 'Ana Chen', color: '#0091ea' },
      { id: 'daniele', name: 'Daniele Leoni', color: '#e91e63' },
      { id: 'marcus', name: 'Marcus Webb', color: '#26a69a' },
      { id: 'sarah', name: 'Sarah Chen', color: '#7b1fa2' },
      { id: 'james', name: 'James Liu', color: '#ff9800' }
    ];

    function person(id) {
      return PEOPLE.find(function(p) { return p.id === id; }) || { name: 'Unassigned', color: '#6b7280' };
    }

    var TASKS = [
      // Open
      { id: 't1', title: 'Missing payment threshold in henderson-msa', status: 'open', module: 'contracts', vault: 'henderson-msa', severity: 'blocker', assignee: null, due: '45m', dueClass: 'overdue' },
      { id: 't2', title: 'Low entity confidence on sony-dist-2024 (38%)', status: 'open', module: 'contracts', vault: 'sony-dist-2024', severity: 'warning', assignee: null, due: null, dueClass: 'normal' },
      { id: 't3', title: 'Enrich Acme Corp account metadata', status: 'open', module: 'crm', vault: 'Acme Corp', severity: 'info', assignee: null, due: '3d', dueClass: 'normal' },
      { id: 't4', title: 'OCR misread on page 4 of the-theorist', status: 'open', module: 'contracts', vault: 'the-theorist', severity: 'warning', assignee: 'ana', due: null, dueClass: 'normal' },
      { id: 't5', title: 'New lead: Drift Audio needs qualification', status: 'open', module: 'crm', vault: 'Drift Audio', severity: 'info', assignee: null, due: '5d', dueClass: 'normal' },
      { id: 't6', title: 'Duplicate account: Sony Music detected', status: 'open', module: 'crm', vault: 'Sony Music', severity: 'warning', assignee: null, due: null, dueClass: 'normal' },
      { id: 't7', title: 'Universal Sub-License APAC extraction failed 2x', status: 'open', module: 'contracts', vault: 'universal-lic-02', severity: 'blocker', assignee: null, due: '2h', dueClass: 'soon' },

      // In Progress
      { id: 't8', title: 'Review pricing terms in warner-amendment', status: 'in_progress', module: 'contracts', vault: 'warner-amendment', severity: 'warning', assignee: 'daniele', due: '4h 30m', dueClass: 'soon' },
      { id: 't9', title: 'Entity disambiguation for warner-amendment', status: 'in_progress', module: 'contracts', vault: 'warner-amendment', severity: 'warning', assignee: 'ana', due: '6h', dueClass: 'normal' },
      { id: 't10', title: 'Onboard Henderson Artists (contract shipped)', status: 'in_progress', module: 'tasks', vault: null, severity: 'info', assignee: 'marcus', due: '1d', dueClass: 'soon' },
      { id: 't11', title: 'Broke Records health score investigation', status: 'in_progress', module: 'crm', vault: 'Broke Records', severity: 'warning', assignee: 'sarah', due: '2d', dueClass: 'normal' },

      // In Review
      { id: 't12', title: 'Patch #11 approval for slowhands distribution', status: 'in_review', module: 'contracts', vault: 'slowhands', severity: 'info', assignee: 'james', due: '2h 15m', dueClass: 'soon' },
      { id: 't13', title: 'Review Sony Q1 extraction results', status: 'in_review', module: 'contracts', vault: 'sony-dist-2024', severity: 'info', assignee: 'sarah', due: '3d', dueClass: 'normal' },
      { id: 't14', title: 'Atlantic Distribution 2026 gate review', status: 'in_review', module: 'contracts', vault: 'atlantic-dist', severity: 'info', assignee: 'james', due: '1d', dueClass: 'soon' },

      // Resolved
      { id: 't15', title: 'Sony Amendment #1 shipped successfully', status: 'resolved', module: 'contracts', vault: 'sony-amend-01', severity: 'info', assignee: 'ana', due: null, dueClass: 'normal' },
      { id: 't16', title: 'Get Dough License agreement extraction complete', status: 'resolved', module: 'contracts', vault: 'getdough-license', severity: 'info', assignee: 'marcus', due: null, dueClass: 'normal' },
      { id: 't17', title: 'Atlantic Management Master approved', status: 'resolved', module: 'contracts', vault: 'atlantic-mgmt', severity: 'info', assignee: 'james', due: null, dueClass: 'normal' },
      { id: 't18', title: 'Get Dough Publishing Master shipped', status: 'resolved', module: 'contracts', vault: 'getdough-pub', severity: 'info', assignee: 'marcus', due: null, dueClass: 'normal' }
    ];

    var COLUMNS = [
      { id: 'open', label: 'Open', dot: 'open' },
      { id: 'in_progress', label: 'In Progress', dot: 'progress' },
      { id: 'in_review', label: 'In Review', dot: 'review' },
      { id: 'resolved', label: 'Resolved', dot: 'resolved' }
    ];

    var currentFilter = 'all';

    // ===== Rendering =====
    function renderBoard() {
      var board = document.getElementById('kanbanBoard');
      var filtered = currentFilter === 'all'
        ? TASKS
        : TASKS.filter(function(t) { return t.module === currentFilter; });

      var html = '';
      COLUMNS.forEach(function(col) {
        var colTasks = filtered.filter(function(t) { return t.status === col.id; });

        html += '<div class="kanban-column" data-status="' + col.id + '" ondragover="onDragOver(event)" ondrop="onDrop(event,\'' + col.id + '\')" ondragenter="onDragEnter(event)" ondragleave="onDragLeave(event)">';
        html += '<div class="column-header">';
        html += '<div class="column-dot ' + col.dot + '"></div>';
        html += '<span class="column-name">' + col.label + '</span>';
        html += '<span class="column-count">' + colTasks.length + '</span>';
        html += '</div>';
        html += '<div class="column-body">';
        colTasks.forEach(function(task) {
          html += renderCard(task);
        });
        html += '</div>';
        // Quick add for open column
        if (col.id === 'open') {
          html += '<div class="quick-add"><input class="quick-add-input" placeholder="+ Add task..." onkeydown="onQuickAdd(event)"></div>';
        }
        html += '</div>';
      });

      board.innerHTML = html;
      updateSummary(filtered);
    }

    function renderCard(task) {
      var p = person(task.assignee);
      var initials = p.name === 'Unassigned' ? '?' : p.name.split(' ').map(function(w) { return w[0]; }).join('');

      var html = '<div class="task-card" draggable="true" data-task-id="' + task.id + '" ondragstart="onDragStart(event,\'' + task.id + '\')" ondragend="onDragEnd(event)">';
      html += '<div class="task-card-header">';
      html += '<div class="task-severity-dot ' + task.severity + '"></div>';
      html += '<div class="task-title">' + task.title + '</div>';
      html += '</div>';
      html += '<div class="task-meta">';
      html += '<span class="task-module-badge ' + task.module + '">' + task.module + '</span>';
      if (task.vault) html += '<span class="task-vault">' + task.vault + '</span>';
      html += '</div>';
      html += '<div class="task-footer">';
      html += '<div class="task-assignee">';
      html += '<div class="task-avatar" style="background:' + p.color + '">' + initials + '</div>';
      html += '<span class="task-assignee-name">' + p.name + '</span>';
      html += '</div>';
      if (task.due) {
        html += '<span class="task-due ' + task.dueClass + '">' + task.due + '</span>';
      }
      html += '</div>';
      html += '</div>';
      return html;
    }

    function updateSummary(filtered) {
      var counts = { open: 0, in_progress: 0, in_review: 0, resolved: 0 };
      var overdue = 0;
      filtered.forEach(function(t) {
        counts[t.status] = (counts[t.status] || 0) + 1;
        if (t.dueClass === 'overdue') overdue++;
      });
      document.getElementById('totalOpen').textContent = counts.open;
      document.getElementById('totalProgress').textContent = counts.in_progress;
      document.getElementById('totalReview').textContent = counts.in_review;
      document.getElementById('totalResolved').textContent = counts.resolved;
      document.getElementById('totalOverdue').textContent = overdue;
    }

    // ===== Drag & Drop =====
    var draggedTaskId = null;

    function onDragStart(e, taskId) {
      draggedTaskId = taskId;
      e.target.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }

    function onDragEnd(e) {
      e.target.classList.remove('dragging');
      draggedTaskId = null;
      // Remove all drag-over classes
      document.querySelectorAll('.kanban-column').forEach(function(c) {
        c.classList.remove('drag-over');
      });
    }

    function onDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
    }

    function onDragEnter(e) {
      e.preventDefault();
      var col = e.target.closest('.kanban-column');
      if (col) col.classList.add('drag-over');
    }

    function onDragLeave(e) {
      var col = e.target.closest('.kanban-column');
      if (col && !col.contains(e.relatedTarget)) {
        col.classList.remove('drag-over');
      }
    }

    function onDrop(e, newStatus) {
      e.preventDefault();
      if (!draggedTaskId) return;
      var task = TASKS.find(function(t) { return t.id === draggedTaskId; });
      if (task && task.status !== newStatus) {
        task.status = newStatus;
        renderBoard();
      }
      document.querySelectorAll('.kanban-column').forEach(function(c) {
        c.classList.remove('drag-over');
      });
    }

    // ===== Filters =====
    function setFilter(filter, el) {
      currentFilter = filter;
      document.querySelectorAll('.filter-pill').forEach(function(p) {
        p.classList.remove('active');
      });
      el.classList.add('active');
      renderBoard();
    }

    function regroup(value) {
      // For prototype, just show an indicator — actual regrouping is TBD
      if (value !== 'status') {
        alert('Grouping by ' + value + ' — visual prototype TBD');
      }
    }

    // ===== Quick Add =====
    function onQuickAdd(e) {
      if (e.key === 'Enter' && e.target.value.trim()) {
        TASKS.push({
          id: 't' + (TASKS.length + 1),
          title: e.target.value.trim(),
          status: 'open',
          module: 'tasks',
          vault: null,
          severity: 'info',
          assignee: null,
          due: null,
          dueClass: 'normal'
        });
        e.target.value = '';
        renderBoard();
      }
    }

    // ===== Theme =====
    var params = new URLSearchParams(window.location.search);
    if (params.get('theme') === 'airlock') {
      document.documentElement.setAttribute('data-theme', 'airlock');
    }

    // ===== Init =====
    renderBoard();
  </script>
</body>
</html>
