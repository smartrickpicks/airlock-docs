<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Activity Feed - Airlock</title>
<style>
:root {
  --bg-darkest: #0d1017;
  --bg-page: #12161f;
  --bg-input: #161b28;
  --bg-panel: #1a1f2e;
  --bg-card: #1e2436;
  --bg-card-hover: #242b3d;
  --text-primary: #e8eaed;
  --text-secondary: #9aa0a6;
  --text-muted: #6b7280;
  --accent-blue: #0091ea;
  --accent-blue-dim: rgba(0,145,234,0.15);
  --green: #4caf50;
  --green-dim: rgba(76,175,80,0.15);
  --amber: #ff9800;
  --amber-dim: rgba(255,152,0,0.12);
  --red: #f44336;
  --red-dim: rgba(244,67,54,0.12);
  --teal: #26a69a;
  --teal-dim: rgba(38,166,154,0.12);
  --purple: #7b1fa2;
  --purple-dim: rgba(123,31,162,0.12);
  --border: #2a3040;
  --border-light: #333b4f;
  --mono: 'SF Mono','Cascadia Code','Consolas','Monaco',monospace;
  --sans: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 10px;
}
html[data-theme="airlock"] {
  --bg-page: #0B0E14;
  --bg-card: #151923;
  --accent-blue: #00D1FF;
  --accent-blue-dim: rgba(0,209,255,0.15);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--bg-page);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ─── TOOLBAR ─── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-panel);
  min-height: 48px;
  flex-shrink: 0;
}
.toolbar-title {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: -0.2px;
  margin-right: 16px;
  white-space: nowrap;
}
.toolbar-title svg { vertical-align: -2px; margin-right: 6px; }
.filter-chips {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.filter-chip {
  padding: 4px 12px;
  font-size: 11px;
  font-weight: 600;
  border: 1px solid var(--border);
  border-radius: 14px;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
  font-family: var(--sans);
  white-space: nowrap;
}
.filter-chip:hover {
  border-color: var(--border-light);
  color: var(--text-secondary);
}
.filter-chip.active {
  background: var(--accent-blue-dim);
  color: var(--accent-blue);
  border-color: var(--accent-blue);
}
.filter-chip .chip-icon {
  margin-right: 4px;
  font-size: 10px;
}
.toolbar-spacer { flex: 1; }
.toolbar-search {
  padding: 5px 10px;
  font-size: 11px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  width: 180px;
  outline: none;
  font-family: var(--sans);
}
.toolbar-search::placeholder { color: var(--text-muted); }
.toolbar-search:focus { border-color: var(--accent-blue); }

/* ─── FEED ─── */
.feed-container {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px 40px;
}
.feed-container::-webkit-scrollbar { width: 6px; }
.feed-container::-webkit-scrollbar-track { background: transparent; }
.feed-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.feed-container::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

/* ─── DATE GROUPS ─── */
.date-group { margin-bottom: 24px; }
.date-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-muted);
  padding: 0 0 8px 0;
  margin-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.date-label span {
  font-weight: 400;
  letter-spacing: 0.4px;
  margin-left: 8px;
  color: var(--text-muted);
  opacity: 0.7;
  font-size: 9px;
  text-transform: none;
}

/* ─── EVENT CARDS ─── */
.event-card {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 12px;
  border-radius: var(--radius-md);
  transition: background 0.12s;
  cursor: default;
  position: relative;
}
.event-card:hover {
  background: var(--bg-card);
}
.event-time {
  font-size: 10px;
  font-family: var(--mono);
  color: var(--text-muted);
  min-width: 62px;
  padding-top: 2px;
  flex-shrink: 0;
  text-align: right;
}
.event-icon {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.event-icon svg { width: 14px; height: 14px; }
.event-icon.type-imessage { background: var(--accent-blue-dim); color: var(--accent-blue); }
.event-icon.type-sms { background: var(--green-dim); color: var(--green); }
.event-icon.type-email { background: rgba(156,163,175,0.12); color: var(--text-secondary); }
.event-icon.type-call { background: var(--purple-dim); color: var(--purple); }
.event-icon.type-deal { background: var(--teal-dim); color: var(--teal); }
.event-icon.type-task-done { background: var(--green-dim); color: var(--green); }
.event-icon.type-task-new { background: var(--accent-blue-dim); color: var(--accent-blue); }
.event-icon.type-lead { background: var(--amber-dim); color: var(--amber); }
.event-icon.type-alert { background: var(--red-dim); color: var(--red); }

.event-body { flex: 1; min-width: 0; }
.event-desc {
  font-size: 12px;
  color: var(--text-primary);
  line-height: 1.5;
}
.event-desc strong { font-weight: 600; }
.event-desc .person-name { color: var(--accent-blue); font-weight: 600; }
.event-detail {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
  line-height: 1.4;
  font-style: italic;
}
.event-detail:not(.preview) { font-style: normal; }
.account-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  font-size: 10px;
  font-weight: 600;
  border-radius: 10px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  margin-top: 5px;
  white-space: nowrap;
}
.account-tag svg { width: 10px; height: 10px; opacity: 0.6; }

/* ─── EMPTY STATE ─── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.empty-state svg { width: 40px; height: 40px; margin-bottom: 12px; opacity: 0.3; }
.empty-state p { font-size: 12px; }
</style>
</head>
<body>

<!-- TOOLBAR -->
<div class="toolbar">

const GROUP_LABELS = {
  'today': { label: 'Today', sub: 'March 5, 2026' },
  'yesterday': { label: 'Yesterday', sub: 'March 4, 2026' },
  'last-week': { label: 'Last Week', sub: 'Feb 23 - Mar 2' }
};

// ─── RENDER ───
let activeFilter = 'all';
let searchQuery = '';

function renderFeed() {
  const container = document.getElementById('feedContainer');
  const filtered = EVENTS.filter(ev => {
    const matchFilter = activeFilter === 'all' || ev.filter === activeFilter;
    const matchSearch = !searchQuery ||
      ev.desc.toLowerCase().includes(searchQuery) ||
      ev.detail.toLowerCase().includes(searchQuery) ||
      ev.account.toLowerCase().includes(searchQuery);
    return matchFilter && matchSearch;
  });

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        <p>No activity matches your filters.</p>
      </div>`;
    return;
  }

  // Group events
  const groups = {};
  filtered.forEach(ev => {
    if (!groups[ev.group]) groups[ev.group] = [];
    groups[ev.group].push(ev);
  });

  let html = '';
  const groupOrder = ['today', 'yesterday', 'last-week'];
  groupOrder.forEach(gk => {
    if (!groups[gk]) return;
    const g = GROUP_LABELS[gk];
    html += `<div class="date-group">`;
    html += `<div class="date-label">${g.label}<span>${g.sub}</span></div>`;
    groups[gk].forEach(ev => {
      html += `
        <div class="event-card" data-filter="${ev.filter}">
          <div class="event-time">${ev.time}</div>
          <div class="event-icon ${ev.iconClass}">${ev.icon}</div>
          <div class="event-body">
            <div class="event-desc">${ev.desc}</div>
            <div class="event-detail${ev.detailIsPreview ? ' preview' : ''}">${ev.detail}</div>
            <div class="account-tag">${ICONS.account} ${ev.account}</div>
          </div>
        </div>`;
    });
    html += `</div>`;
  });

  container.innerHTML = html;
}

// ─── FILTER CHIPS ───
document.getElementById('filterChips').addEventListener('click', e => {
  const chip = e.target.closest('.filter-chip');
  if (!chip) return;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  activeFilter = chip.dataset.filter;
  renderFeed();
});

// ─── SEARCH ───
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase().trim();
  renderFeed();
});

// ─── INIT ───
renderFeed();
</script>
