<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Customer Onboarding - Airlock</title>
<style>
:root {
  --bg-darkest: #0d1017;
  --bg-page: #12161f;
  --bg-input: #161b28;
  --bg-panel: #1a1f2e;
  --bg-card: #1e2436;
  --bg-card-hover: #242b3d;
  --text-primary: #e8eaed;
  --text-secondary: #9aa0a6;
  --text-muted: #6b7280;
  --accent-blue: #0091ea;
  --accent-blue-dim: rgba(0,145,234,0.15);
  --green: #4caf50;
  --green-dim: rgba(76,175,80,0.15);
  --amber: #ff9800;
  --amber-dim: rgba(255,152,0,0.12);
  --red: #f44336;
  --red-dim: rgba(244,67,54,0.12);
  --teal: #26a69a;
  --teal-dim: rgba(38,166,154,0.12);
  --purple: #7b1fa2;
  --purple-dim: rgba(123,31,162,0.12);
  --border: #2a3040;
  --border-light: #333b4f;
  --mono: 'SF Mono','Cascadia Code','Consolas','Monaco',monospace;
  --sans: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 10px;
}
html[data-theme="airlock"] {
  --bg-page: #0B0E14;
  --bg-card: #151923;
  --accent-blue: #00D1FF;
  --accent-blue-dim: rgba(0,209,255,0.15);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--bg-page);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ─── TOOLBAR ─── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-panel);
  min-height: 48px;
  flex-shrink: 0;
}
.toolbar-title {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: -0.2px;
  margin-right: 16px;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
}
.toolbar-title svg { flex-shrink: 0; }
.filter-chips {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.filter-chip {
  padding: 4px 12px;
  font-size: 11px;
  font-weight: 600;
  border: 1px solid var(--border);
  border-radius: 14px;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
  font-family: var(--sans);
  white-space: nowrap;
}
.filter-chip:hover {
  border-color: var(--border-light);
  color: var(--text-secondary);
}
.filter-chip.active {
  background: var(--accent-blue-dim);
  color: var(--accent-blue);
  border-color: var(--accent-blue);
}
.toolbar-spacer { flex: 1; }
.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  font-size: 10px;
  font-weight: 700;
  border-radius: 10px;
  background: var(--accent-blue-dim);
  color: var(--accent-blue);
  letter-spacing: 0.3px;
  white-space: nowrap;
}

/* ─── MAIN SCROLLABLE AREA ─── */
.main-area {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px 40px;
}
.main-area::-webkit-scrollbar { width: 6px; }
.main-area::-webkit-scrollbar-track { background: transparent; }
.main-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.main-area::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

/* ─── ONBOARDING CARD ─── */
.onboarding-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  margin-bottom: 16px;
  transition: border-color 0.15s;
}
.onboarding-card:hover {
  border-color: var(--border-light);
}
.onboarding-card.completed {
  opacity: 0.55;
}

/* Card Header */
.card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 16px;
}
.card-header-left { display: flex; flex-direction: column; gap: 6px; }
.customer-name {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.3px;
  color: var(--text-primary);
}
.card-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.meta-item {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--text-muted);
}
.meta-item svg { width: 12px; height: 12px; opacity: 0.6; flex-shrink: 0; }
.status-badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  font-size: 10px;
  font-weight: 700;
  border-radius: 10px;
  letter-spacing: 0.4px;
  text-transform: uppercase;
}
.status-badge.active {
  background: var(--accent-blue-dim);
  color: var(--accent-blue);
}
.status-badge.completed-badge {
  background: var(--green-dim);
  color: var(--green);
}

/* Progress */
.progress-section {
  margin-bottom: 16px;
}
.progress-info {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}
.progress-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-secondary);
}
.progress-pct {
  font-size: 12px;
  font-weight: 700;
  font-family: var(--mono);
}
.progress-pct.red { color: var(--red); }
.progress-pct.amber { color: var(--amber); }
.progress-pct.green { color: var(--green); }
.progress-bar-track {
  width: 100%;
  height: 6px;
  background: var(--bg-panel);
  border-radius: 3px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.4s ease;
}
.progress-bar-fill.red { background: var(--red); }
.progress-bar-fill.amber { background: var(--amber); }
.progress-bar-fill.green { background: var(--green); }

/* Checklist */
.checklist {
  list-style: none;
  margin-bottom: 14px;
}
.checklist-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  transition: background 0.12s;
}
.checklist-item:hover {
  background: var(--bg-card-hover);
}
.checklist-item + .checklist-item {
  border-top: 1px solid var(--border);
}

/* Checkbox */
.check-box {
  width: 18px;
  height: 18px;
  border-radius: 4px;
  border: 2px solid var(--border-light);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  cursor: pointer;
  transition: all 0.15s;
}
.check-box.checked {
  background: var(--green);
  border-color: var(--green);
}
.check-box.checked svg { display: block; }
.check-box svg {
  display: none;
  width: 12px;
  height: 12px;
  color: #fff;
}

/* Item content */
.item-content {
  flex: 1;
  min-width: 0;
}
.item-label {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-primary);
  line-height: 1.3;
}
.item-label.done {
  text-decoration: line-through;
  color: var(--text-muted);
}
.item-label.overdue {
  color: var(--red);
}

/* Status dot */
.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.status-dot.done { background: var(--green); }
.status-dot.overdue { background: var(--red); }
.status-dot.today { background: var(--accent-blue); }
.status-dot.upcoming { background: var(--text-muted); }

/* Item meta */
.item-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.item-assignee {
  font-size: 10px;
  color: var(--text-muted);
  white-space: nowrap;
}
.item-date {
  font-size: 10px;
  font-family: var(--mono);
  color: var(--text-muted);
  white-space: nowrap;
}
.item-date.overdue {
  color: var(--red);
  font-weight: 600;
}
.item-date.today {
  color: var(--accent-blue);
  font-weight: 600;
}
.item-status {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  white-space: nowrap;
  min-width: 56px;
  text-align: right;
}
.item-status.done { color: var(--green); }
.item-status.overdue { color: var(--red); }
.item-status.today { color: var(--accent-blue); }
.item-status.upcoming { color: var(--text-muted); }

/* Card actions */
.card-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.card-btn {
  padding: 6px 14px;
  font-size: 11px;
  font-weight: 600;
  font-family: var(--sans);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.card-btn:hover {
  border-color: var(--accent-blue);
  color: var(--accent-blue);
  background: var(--accent-blue-dim);
}
.card-btn svg { width: 12px; height: 12px; }

/* ─── EMPTY STATE ─── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.empty-state svg { width: 40px; height: 40px; margin-bottom: 12px; opacity: 0.3; }
.empty-state p { font-size: 12px; }
</style>
</head>
<body>

<!-- TOOLBAR -->
<div class="toolbar">
  <span class="toolbar-title">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4-4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
    Customer Onboarding
  </span>
  <div class="filter-chips" id="filterChips">
    <button class="filter-chip active" data-filter="active">Active</button>
    <button class="filter-chip" data-filter="completed">Completed</button>
    <button class="filter-chip" data-filter="all">All</button>
  </div>
  <div class="toolbar-spacer"></div>
  <span class="badge" id="countBadge">1 active</span>
</div>

<!-- MAIN -->
<div class="main-area" id="mainArea"></div>

<script>
// ─── THEME ───
(function(){
  const p = new URLSearchParams(window.location.search);
  if (p.get('theme') === 'airlock') document.documentElement.setAttribute('data-theme','airlock');
})();

// ─── SVG SNIPPETS ───
const SVG = {
  check: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
  calendar: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
  user: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
  assign: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4-4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>',
  bell: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>'
};

// ─── ONBOARDING DATA ───
const WORKFLOWS = [
  {
    id: 'bluewave',
    customer: 'Bluewave Digital',
    status: 'active',
    startDate: 'Feb 28, 2026',
    rep: 'Ana Chen',
    pct: 40,
    items: [
      { label: 'Welcome email sent', assignee: 'Ana Chen', date: 'Feb 28', done: true, state: 'done' },
      { label: 'Account setup call', assignee: 'Ana Chen', date: 'Mar 1', done: true, state: 'done' },
      { label: 'Document upload training', assignee: 'Sarah Miller', date: 'Mar 5', done: false, state: 'today' },
      { label: 'Workflow configuration', assignee: 'David Park', date: 'Mar 8', done: false, state: 'upcoming' },
      { label: 'Go-live review call', assignee: 'Ana Chen', date: 'Mar 12', done: false, state: 'upcoming' }
    ]
  },
  {
    id: 'horizon',
    customer: 'Horizon Records',
    status: 'active',
    startDate: 'Mar 1, 2026',
    rep: 'Sarah Miller',
    pct: 20,
    items: [
      { label: 'Welcome email sent', assignee: 'Sarah Miller', date: 'Mar 1', done: true, state: 'done' },
      { label: 'Account setup call', assignee: 'Sarah Miller', date: 'Mar 4', done: false, state: 'overdue' },
      { label: 'Document upload training', assignee: 'Marcus Webb', date: 'Mar 7', done: false, state: 'upcoming' },
      { label: 'Smart Line provisioning', assignee: 'Ana Chen', date: 'Mar 10', done: false, state: 'upcoming' },
      { label: 'Go-live review call', assignee: 'Sarah Miller', date: 'Mar 14', done: false, state: 'upcoming' }
    ]
  },
  {
    id: 'techflow',
    customer: 'TechFlow Inc',
    status: 'completed',
    startDate: 'Feb 10, 2026',
    rep: 'Marcus Webb',
    pct: 100,
    items: [
      { label: 'Welcome email sent', assignee: 'Marcus Webb', date: 'Feb 10', done: true, state: 'done' },
      { label: 'Account setup call', assignee: 'Marcus Webb', date: 'Feb 12', done: true, state: 'done' },
      { label: 'Document upload training', assignee: 'Ana Chen', date: 'Feb 15', done: true, state: 'done' },
      { label: 'Workflow configuration', assignee: 'David Park', date: 'Feb 19', done: true, state: 'done' },
      { label: 'Go-live review call', assignee: 'Marcus Webb', date: 'Feb 24', done: true, state: 'done' }
    ]
  }
];

// ─── HELPERS ───
function progressColor(pct) {
  if (pct < 33) return 'red';
  if (pct <= 66) return 'amber';
  return 'green';
}

function stateLabel(state) {
  switch(state) {
    case 'done': return 'Done';
    case 'overdue': return 'Overdue';
    case 'today': return 'Today';
    case 'upcoming': return 'Upcoming';
    default: return '';
  }
}

// ─── RENDER ───
let activeFilter = 'active';

function getFiltered() {
  if (activeFilter === 'all') return WORKFLOWS;
  return WORKFLOWS.filter(w => w.status === activeFilter);
}

function updateBadge() {
  const activeCount = WORKFLOWS.filter(w => w.status === 'active').length;
  document.getElementById('countBadge').textContent = activeCount + ' active';
}

function renderCards() {
  const container = document.getElementById('mainArea');
  const data = getFiltered();

  if (data.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4-4v2"/><circle cx="9" cy="7" r="4"/>
          <path d="M22 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/>
        </svg>
        <p>No onboarding workflows match this filter.</p>
      </div>`;
    return;
  }

  let html = '';
  data.forEach(w => {
    const color = progressColor(w.pct);
    const isCompleted = w.status === 'completed';

    html += `<div class="onboarding-card${isCompleted ? ' completed' : ''}" data-id="${w.id}">`;

    // Header
    html += `<div class="card-header">`;
    html += `<div class="card-header-left">`;
    html += `<div class="customer-name">${w.customer}</div>`;
    html += `<div class="card-meta">`;
    html += `<span class="meta-item">${SVG.calendar} Started ${w.startDate}</span>`;
    html += `<span class="meta-item">${SVG.user} ${w.rep}</span>`;
    html += `</div></div>`;
    html += `<span class="status-badge ${isCompleted ? 'completed-badge' : 'active'}">${w.status}</span>`;
    html += `</div>`;

    // Progress
    html += `<div class="progress-section">`;
    html += `<div class="progress-info">`;
    html += `<span class="progress-label">Onboarding Progress</span>`;
    html += `<span class="progress-pct ${color}">${w.pct}%</span>`;
    html += `</div>`;
    html += `<div class="progress-bar-track"><div class="progress-bar-fill ${color}" style="width:${w.pct}%"></div></div>`;
    html += `</div>`;

    // Checklist
    html += `<ul class="checklist">`;
    w.items.forEach((item, idx) => {
      const labelClass = item.done ? 'done' : (item.state === 'overdue' ? 'overdue' : '');
      const dateClass = item.state === 'overdue' ? 'overdue' : (item.state === 'today' ? 'today' : '');
      html += `<li class="checklist-item" data-wf="${w.id}" data-idx="${idx}">`;
      html += `<div class="check-box${item.done ? ' checked' : ''}" data-wf="${w.id}" data-idx="${idx}">${SVG.check}</div>`;
      html += `<span class="status-dot ${item.state}"></span>`;
      html += `<div class="item-content"><span class="item-label ${labelClass}">${item.label}</span></div>`;
      html += `<div class="item-meta">`;
      html += `<span class="item-assignee">${item.assignee}</span>`;
      html += `<span class="item-date ${dateClass}">${item.date}</span>`;
      html += `<span class="item-status ${item.state}">${stateLabel(item.state)}</span>`;
      html += `</div>`;
      html += `</li>`;
    });
    html += `</ul>`;

    // Actions
    if (!isCompleted) {
      html += `<div class="card-actions">`;
      html += `<button class="card-btn" data-action="assign" data-wf="${w.id}">${SVG.assign} Assign All</button>`;
      html += `<button class="card-btn" data-action="remind" data-wf="${w.id}">${SVG.bell} Send Reminder</button>`;
      html += `</div>`;
    }

    html += `</div>`;
  });

  container.innerHTML = html;
}

// ─── FILTER CHIPS ───
document.getElementById('filterChips').addEventListener('click', e => {
  const chip = e.target.closest('.filter-chip');
  if (!chip) return;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  activeFilter = chip.dataset.filter;
  renderCards();
});

// ─── CHECKBOX TOGGLE ───
document.getElementById('mainArea').addEventListener('click', e => {
  const box = e.target.closest('.check-box');
  if (box) {
    const wfId = box.dataset.wf;
    const idx = parseInt(box.dataset.idx, 10);
    const wf = WORKFLOWS.find(w => w.id === wfId);
    if (!wf) return;
    const item = wf.items[idx];
    item.done = !item.done;
    if (item.done) {
      item.state = 'done';
    } else {
      // Restore original state based on date logic (simplified)
      item.state = 'upcoming';
    }
    // Recalculate progress
    const doneCount = wf.items.filter(i => i.done).length;
    wf.pct = Math.round((doneCount / wf.items.length) * 100);
    // Check if fully completed
    if (wf.pct === 100) {
      wf.status = 'completed';
    } else if (wf.status === 'completed') {
      wf.status = 'active';
    }
    updateBadge();
    renderCards();
    return;
  }

  // Action buttons
  const btn = e.target.closest('.card-btn');
  if (btn) {
    const action = btn.dataset.action;
    const wfId = btn.dataset.wf;
    const wf = WORKFLOWS.find(w => w.id === wfId);
    if (!wf) return;
    if (action === 'assign') {
      btn.textContent = 'Assigned!';
      btn.style.borderColor = 'var(--green)';
      btn.style.color = 'var(--green)';
      btn.style.background = 'var(--green-dim)';
      setTimeout(() => renderCards(), 1200);
    } else if (action === 'remind') {
      btn.textContent = 'Sent!';
      btn.style.borderColor = 'var(--green)';
      btn.style.color = 'var(--green)';
      btn.style.background = 'var(--green-dim)';
      setTimeout(() => renderCards(), 1200);
    }
  }
});

// ─── INIT ───
updateBadge();
renderCards();
</script>
</body>
</html>
