<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Airlock — CRM Deal Review</title>
<style>
/* ===== Base Tokens ===== */
:root {
  --bg-darkest: #0d1017;
  --bg-page: #12161f;
  --bg-input: #161b28;
  --bg-panel: #1a1f2e;
  --bg-card: #1e2436;
  --bg-card-hover: #242b3d;
  --text-primary: #e8eaed;
  --text-secondary: #9aa0a6;
  --text-muted: #6b7280;
  --accent-blue: #0091ea;
  --accent-blue-dim: rgba(0,145,234,0.15);
  --green: #4caf50;
  --green-dim: rgba(76,175,80,0.15);
  --amber: #ff9800;
  --amber-dim: rgba(255,152,0,0.12);
  --red: #f44336;
  --red-dim: rgba(244,67,54,0.12);
  --teal: #26a69a;
  --teal-dim: rgba(38,166,154,0.12);
  --purple: #7b1fa2;
  --purple-dim: rgba(123,31,162,0.12);
  --border: #2a3040;
  --border-light: #333b4f;
  --mono: 'SF Mono','Cascadia Code','Consolas','Monaco',monospace;
  --sans: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 10px;
}

html[data-theme="airlock"] {
  --bg-darkest: #080a0f;
  --bg-page: #0B0E14;
  --bg-input: #0F1219;
  --bg-panel: #0F1219;
  --bg-card: #151923;
  --bg-card-hover: #1a2030;
  --border: #1E2330;
  --border-light: #2a3040;
  --accent-blue: #00D1FF;
  --accent-blue-dim: rgba(0,209,255,0.12);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--sans);
  background: var(--bg-page);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ─── TOOLBAR ─── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-panel);
  min-height: 48px;
  flex-shrink: 0;
}

.toolbar-title {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: -0.2px;
  margin-right: 16px;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
}

.toolbar-title svg { width: 15px; height: 15px; flex-shrink: 0; }

.filter-chips {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.filter-chip {
  padding: 4px 12px;
  font-size: 11px;
  font-weight: 600;
  border: 1px solid var(--border);
  border-radius: 14px;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
  font-family: var(--sans);
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}

.filter-chip:hover {
  border-color: var(--border-light);
  color: var(--text-secondary);
}

.filter-chip.active {
  background: var(--accent-blue-dim);
  color: var(--accent-blue);
  border-color: var(--accent-blue);
}

.chip-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 16px;
  height: 16px;
  padding: 0 4px;
  font-size: 9px;
  font-weight: 700;
  border-radius: 8px;
  background: var(--border);
  color: var(--text-muted);
}

.filter-chip.active .chip-badge {
  background: var(--accent-blue);
  color: #000;
}

.toolbar-spacer { flex: 1; }

.toolbar-stat {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  font-size: 11px;
  font-weight: 600;
  border-radius: 14px;
  white-space: nowrap;
}

.toolbar-stat.sla-warning {
  background: var(--amber-dim);
  color: var(--amber);
}

.toolbar-stat.sla-warning svg { width: 12px; height: 12px; }

/* ─── TABLE AREA ─── */
.table-container {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.table-container::-webkit-scrollbar { width: 6px; }
.table-container::-webkit-scrollbar-track { background: transparent; }
.table-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.table-container::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}

thead {
  position: sticky;
  top: 0;
  z-index: 5;
}

thead th {
  padding: 10px 14px;
  text-align: left;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

thead th:first-child { padding-left: 20px; }
thead th:last-child { padding-right: 20px; }

tbody tr {
  border-left: 3px solid transparent;
  cursor: pointer;
  transition: background 0.12s;
}

tbody tr:hover { background: var(--bg-card-hover); }
tbody tr.selected { background: var(--bg-card); border-left-color: var(--accent-blue); }

tbody tr.urgency-amber { border-left-color: var(--amber); }
tbody tr.urgency-red { border-left-color: var(--red); }
tbody tr.urgency-green { border-left-color: var(--green); }
tbody tr.urgency-purple { border-left-color: var(--purple); }
tbody tr.urgency-muted { border-left-color: var(--text-muted); }

tbody td {
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}

tbody td:first-child { padding-left: 20px; }
tbody td:last-child { padding-right: 20px; }

.col-deal {
  font-weight: 600;
  color: var(--text-primary);
}

.col-deal-sub {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 1px;
}

.col-value {
  font-family: var(--mono);
  font-weight: 600;
  color: var(--text-primary);
}

.col-stage {
  font-size: 11px;
  color: var(--text-secondary);
}

.stage-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  margin-right: 5px;
}

.stage-dot.prospecting { background: var(--text-muted); }
.stage-dot.discovery { background: var(--teal); }
.stage-dot.proposal { background: var(--accent-blue); }
.stage-dot.negotiation { background: var(--amber); }
.stage-dot.close { background: var(--green); }

.col-reviewer {
  color: var(--text-secondary);
  font-size: 11px;
}

.reviewer-avatar {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  font-size: 9px;
  font-weight: 700;
  margin-right: 6px;
  vertical-align: middle;
  color: #fff;
}

.avatar-sm { background: var(--accent-blue); }
.avatar-dp { background: var(--teal); }
.avatar-ac { background: var(--purple); }
.avatar-mw { background: var(--amber); }

/* Status pills */
.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  font-size: 10px;
  font-weight: 700;
  border-radius: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  white-space: nowrap;
}

.status-pill .status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.status-pill.status-pending {
  background: var(--amber-dim);
  color: var(--amber);
}
.status-pending .status-dot { background: var(--amber); }

.status-pill.status-approved {
  background: var(--green-dim);
  color: var(--green);
}
.status-approved .status-dot { background: var(--green); }

.status-pill.status-rejected {
  background: var(--red-dim);
  color: var(--red);
}
.status-rejected .status-dot { background: var(--red); }

.status-pill.status-changes {
  background: var(--purple-dim);
  color: var(--purple);
}
.status-changes .status-dot { background: var(--purple); }

/* SLA Timer */
.sla-timer {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
}

.sla-timer.sla-active {
  color: var(--text-secondary);
}

.sla-timer.sla-urgent {
  color: var(--amber);
}

.sla-timer.sla-overdue {
  color: var(--red);
  animation: pulse-overdue 1.5s infinite;
}

.sla-timer.sla-done {
  color: var(--text-muted);
}

@keyframes pulse-overdue {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.sla-icon {
  display: inline-block;
  width: 12px;
  height: 12px;
  margin-right: 4px;
  vertical-align: -1px;
}

/* ─── FOOTER ─── */
.table-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  border-top: 1px solid var(--border);
  background: var(--bg-panel);
  flex-shrink: 0;
  font-size: 11px;
}

.footer-info {
  font-weight: 600;
  color: var(--text-secondary);
}

.footer-info span {
  color: var(--text-primary);
  font-family: var(--mono);
  font-weight: 700;
}

.footer-count {
  color: var(--text-muted);
}

/* ─── DETAIL SLIDE-OVER ─── */
.detail-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 90;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

.detail-overlay.open {
  opacity: 1;
  pointer-events: auto;
}

.detail-panel {
  position: fixed;
  top: 0;
  right: -40%;
  width: 40%;
  min-width: 420px;
  height: 100vh;
  background: var(--bg-panel);
  border-left: 1px solid var(--border);
  z-index: 100;
  display: flex;
  flex-direction: column;
  transition: right 0.25s ease;
  overflow: hidden;
}

.detail-panel.open { right: 0; }

.detail-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.detail-header-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.detail-header-title {
  font-size: 14px;
  font-weight: 700;
}

.detail-close {
  width: 28px;
  height: 28px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  font-size: 14px;
}

.detail-close:hover {
  border-color: var(--border-light);
  color: var(--text-primary);
  background: var(--bg-card);
}

.detail-body {
  flex: 1;
  overflow-y: auto;
  padding: 0;
}

.detail-body::-webkit-scrollbar { width: 5px; }
.detail-body::-webkit-scrollbar-track { background: transparent; }
.detail-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ─── DETAIL SECTIONS ─── */
.detail-section {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}

.detail-section-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
  margin-bottom: 12px;
}

/* Summary grid */
.summary-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.summary-item-label {
  font-size: 10px;
  color: var(--text-muted);
  margin-bottom: 2px;
}

.summary-item-value {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-primary);
}

.summary-item-value.mono {
  font-family: var(--mono);
}

/* Approval chain */
.approval-chain {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.approval-step {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  position: relative;
}

.approval-step:not(:last-child)::after {
  content: '';
  position: absolute;
  left: 13px;
  top: 34px;
  bottom: -8px;
  width: 1px;
  background: var(--border);
}

.approval-node {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 10px;
}

.approval-node.node-approved {
  background: var(--green-dim);
  color: var(--green);
  border: 1.5px solid var(--green);
}

.approval-node.node-pending {
  background: var(--amber-dim);
  color: var(--amber);
  border: 1.5px solid var(--amber);
  animation: pulse-node 2s infinite;
}

.approval-node.node-waiting {
  background: transparent;
  color: var(--text-muted);
  border: 1.5px dashed var(--border-light);
}

.approval-node.node-rejected {
  background: var(--red-dim);
  color: var(--red);
  border: 1.5px solid var(--red);
}

@keyframes pulse-node {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,152,0,0.3); }
  50% { box-shadow: 0 0 0 4px rgba(255,152,0,0); }
}

.approval-info {
  flex: 1;
}

.approval-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-primary);
}

.approval-role {
  font-size: 10px;
  color: var(--text-muted);
}

.approval-status-text {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.approval-status-text.text-approved { color: var(--green); }
.approval-status-text.text-pending { color: var(--amber); }
.approval-status-text.text-waiting { color: var(--text-muted); }
.approval-status-text.text-rejected { color: var(--red); }

/* Checklist */
.checklist {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.checklist-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  border-radius: var(--radius-sm);
  background: var(--bg-card);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.12s;
}

.checklist-item:hover {
  background: var(--bg-card-hover);
}

.check-box {
  width: 16px;
  height: 16px;
  border-radius: 3px;
  border: 1.5px solid var(--border-light);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
}

.checklist-item.checked .check-box {
  background: var(--green);
  border-color: var(--green);
}

.check-box svg {
  width: 10px;
  height: 10px;
  color: #000;
  opacity: 0;
}

.checklist-item.checked .check-box svg {
  opacity: 1;
}

.check-label {
  font-size: 11px;
  color: var(--text-secondary);
}

.checklist-item.checked .check-label {
  color: var(--text-muted);
  text-decoration: line-through;
}

/* Comments */
.comments-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.comment {
  padding: 10px 12px;
  border-radius: var(--radius-md);
  background: var(--bg-card);
  border: 1px solid var(--border);
}

.comment-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}

.comment-author {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-primary);
}

.comment-time {
  font-size: 10px;
  color: var(--text-muted);
}

.comment-body {
  font-size: 11px;
  color: var(--text-secondary);
  line-height: 1.5;
}

.comment-input-row {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}

.comment-input {
  flex: 1;
  padding: 7px 10px;
  font-size: 11px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-input);
  color: var(--text-primary);
  font-family: var(--sans);
  outline: none;
  transition: border-color 0.15s;
}

.comment-input:focus {
  border-color: var(--accent-blue);
}

.comment-input::placeholder {
  color: var(--text-muted);
}

.comment-send {
  padding: 6px 12px;
  font-size: 10px;
  font-weight: 700;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  font-family: var(--sans);
  transition: all 0.15s;
}

.comment-send:hover {
  border-color: var(--accent-blue);
  color: var(--accent-blue);
  background: var(--accent-blue-dim);
}

/* ─── ACTION BAR ─── */
.detail-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  background: var(--bg-card);
  flex-shrink: 0;
}

.action-btn {
  padding: 7px 16px;
  font-size: 11px;
  font-weight: 700;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  font-family: var(--sans);
  transition: all 0.15s;
}

.action-btn:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-light);
  color: var(--text-primary);
}

.action-btn.btn-approve {
  background: var(--green);
  border-color: var(--green);
  color: #000;
}

.action-btn.btn-approve:hover {
  background: #66bb6a;
  border-color: #66bb6a;
}

.action-btn.btn-changes {
  border-color: var(--purple);
  color: var(--purple);
  background: var(--purple-dim);
}

.action-btn.btn-changes:hover {
  background: rgba(123,31,162,0.25);
}

.action-btn.btn-reject {
  border-color: var(--red);
  color: var(--red);
  background: var(--red-dim);
}

.action-btn.btn-reject:hover {
  background: rgba(244,67,54,0.2);
}

.action-spacer { flex: 1; }

/* ─── EMPTY STATE ─── */
.empty-state {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 8px;
  color: var(--text-muted);
  font-size: 13px;
}

.empty-state svg { width: 40px; height: 40px; opacity: 0.3; }
</style>
</head>
<body>

<!-- ===== TOOLBAR ===== -->
<div class="toolbar">
  <div class="toolbar-title">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
    </svg>
    Deal Review
  </div>

  <div class="filter-chips">
    <button class="filter-chip" data-filter="all" onclick="setFilter('all')">All <span class="chip-badge" id="badge-all">6</span></button>
    <button class="filter-chip active" data-filter="pending" onclick="setFilter('pending')">Pending <span class="chip-badge" id="badge-pending">2</span></button>
    <button class="filter-chip" data-filter="approved" onclick="setFilter('approved')">Approved <span class="chip-badge" id="badge-approved">2</span></button>
    <button class="filter-chip" data-filter="rejected" onclick="setFilter('rejected')">Rejected <span class="chip-badge" id="badge-rejected">1</span></button>
    <button class="filter-chip" data-filter="changes" onclick="setFilter('changes')">Changes Req. <span class="chip-badge" id="badge-changes">1</span></button>
  </div>

  <div class="toolbar-spacer"></div>

  <div class="toolbar-stat sla-warning">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    1 Overdue
  </div>
</div>

<!-- ===== TABLE ===== -->
<div class="table-container">
  <table>
    <thead>
      <tr>
        <th>Deal</th>
        <th>Value</th>
        <th>Stage</th>
        <th>Reviewer</th>
        <th>Status</th>
        <th>SLA Timer</th>
      </tr>
    </thead>
    <tbody id="deal-tbody"></tbody>
  </table>

  <div class="empty-state" id="empty-state" style="display:none;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    No deals match this filter
  </div>
</div>

<!-- ===== FOOTER ===== -->
<div class="table-footer">
  <div class="footer-info">Pipeline under review: <span id="footer-value">$1.05M</span></div>
  <div class="footer-count" id="footer-count">Showing 2 of 6 deals</div>
</div>

<!-- ===== DETAIL SLIDE-OVER ===== -->
<div class="detail-overlay" id="detail-overlay" onclick="closeDetail()"></div>
<div class="detail-panel" id="detail-panel">
  <div class="detail-header">

      <div class="detail-header-title" id="detail-title">Deal Review</div>

let currentFilter = 'pending';
let selectedDealId = null;

// ===== Render table =====
function formatCurrency(val) {
  if (val >= 1000000) return '$' + (val / 1000000).toFixed(2) + 'M';
  return '$' + (val / 1000).toFixed(0) + 'K';
}

function renderTable() {
  const tbody = document.getElementById('deal-tbody');
  const filtered = currentFilter === 'all' ? deals : deals.filter(d => d.status === currentFilter);

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    document.getElementById('empty-state').style.display = 'flex';
  } else {
    document.getElementById('empty-state').style.display = 'none';
    tbody.innerHTML = filtered.map(d => `
      <tr class="${d.urgencyClass}${selectedDealId === d.id ? ' selected' : ''}" onclick="openDetail(${d.id})" data-id="${d.id}">
        <td>
          <div class="col-deal">${d.name}</div>
          <div class="col-deal-sub">${d.account}</div>
        </td>
        <td class="col-value">${formatCurrency(d.value)}</td>
        <td class="col-stage"><span class="stage-dot ${d.stageClass}"></span>${d.stage}</td>
        <td class="col-reviewer"><span class="reviewer-avatar ${d.avatarClass}">${d.reviewerAvatar}</span>${d.reviewer}</td>
        <td><span class="status-pill status-${d.status}"><span class="status-dot"></span>${d.statusLabel}</span></td>
        <td>
          <span class="sla-timer ${d.slaClass}">
            ${d.slaClass === 'sla-overdue' ? '<svg class="sla-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>' : ''}${d.slaText}
          </span>
        </td>
      </tr>
    `).join('');
  }

  // Footer
  const totalValue = filtered.reduce((s, d) => s + d.value, 0);
  document.getElementById('footer-value').textContent = totalValue >= 1000000
    ? '$' + (totalValue / 1000000).toFixed(2) + 'M'
    : '$' + (totalValue / 1000).toFixed(0) + 'K';
  document.getElementById('footer-count').textContent = `Showing ${filtered.length} of ${deals.length} deals`;
}

// ===== Filters =====
function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c.dataset.filter === filter));
  renderTable();
}

// ===== Detail panel =====
function openDetail(id) {
  selectedDealId = id;
  const deal = deals.find(d => d.id === id);
  if (!deal) return;

  renderTable(); // update selected row

  document.getElementById('detail-title').textContent = deal.name;

  // Status pill
  const pillEl = document.getElementById('detail-status-pill');
  pillEl.className = 'status-pill status-' + deal.status;
  pillEl.innerHTML = '<span class="status-dot"></span>' + deal.statusLabel;

  // Body
  const body = document.getElementById('detail-body');
  body.innerHTML = `
    <!-- Summary -->
    <div class="detail-section">
      <div class="detail-section-title">Deal Summary</div>
      <div class="summary-grid">
        <div>
          <div class="summary-item-label">Account</div>
          <div class="summary-item-value">${deal.account}</div>
        </div>
        <div>
          <div class="summary-item-label">Value</div>
          <div class="summary-item-value mono">${formatCurrency(deal.value)}</div>
        </div>
        <div>
          <div class="summary-item-label">Stage</div>
          <div class="summary-item-value"><span class="stage-dot ${deal.stageClass}"></span>${deal.stage}</div>
        </div>
        <div>
          <div class="summary-item-label">Owner</div>
          <div class="summary-item-value">${deal.owner}</div>
        </div>

          <div class="summary-item-label">Reviewer</div>
          <div class="summary-item-value">${deal.reviewer}</div>
        </div>
        <div>

    </div>

    <!-- Approval Chain -->

          <div class="approval-step">
            <div class="approval-node ${a.statusClass}">
              ${a.status === 'approved' ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>' : ''}
              ${a.status === 'pending' ? '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>' : ''}
              ${a.status === 'waiting' ? '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/></svg>' : ''}
              ${a.status === 'rejected' || a.status === 'changes' ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' : ''}

              <div class="approval-role">${a.role}</div>

            <div class="approval-status-text ${a.textClass}">${a.status === 'changes' ? 'Changes Req.' : a.status.charAt(0).toUpperCase() + a.status.slice(1)}</div>

          <div class="checklist-item${item.checked ? ' checked' : ''}" onclick="toggleCheck(${deal.id}, ${idx}); event.stopPropagation();">
            <div class="check-box">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>

            <span class="check-label">${item.label}</span>
          </div>
        `).join('')}
      </div>
    </div>

    <!-- Comments -->
    <div class="detail-section" style="border-bottom: none;">
      <div class="detail-section-title">Comments</div>
      <div class="comments-list">
        ${deal.comments.map(c => `
          <div class="comment">

      </div>
      <div class="comment-input-row">
        <input class="comment-input" placeholder="Add a comment..." onkeydown="if(event.key==='Enter')addComment(${deal.id}, this)">
        <button class="comment-send" onclick="addComment(${deal.id}, this.previousElementSibling)">Send</button>
      </div>
    </div>
  `;

  // Actions
  const actions = document.getElementById('detail-actions');
  if (deal.status === 'pending' || deal.status === 'changes') {
    actions.innerHTML = `
      <button class="action-btn btn-approve" onclick="setDealStatus(${deal.id}, 'approved')">Approve</button>
      <button class="action-btn btn-changes" onclick="setDealStatus(${deal.id}, 'changes')">Request Changes</button>
      <button class="action-btn btn-reject" onclick="setDealStatus(${deal.id}, 'rejected')">Reject</button>
    `;
  } else {
    actions.innerHTML = `
      <span style="font-size:11px; color:var(--text-muted);">This deal has been ${deal.statusLabel.toLowerCase()}.</span>
    `;
  }

  // Open panel
  document.getElementById('detail-overlay').classList.add('open');
  document.getElementById('detail-panel').classList.add('open');
}

function closeDetail() {
  selectedDealId = null;
  document.getElementById('detail-overlay').classList.remove('open');
  document.getElementById('detail-panel').classList.remove('open');
  renderTable();
}

// ===== Checklist toggle =====
function toggleCheck(dealId, idx) {
  const deal = deals.find(d => d.id === dealId);
  if (!deal) return;
  deal.checklist[idx].checked = !deal.checklist[idx].checked;
  openDetail(dealId);
}

// ===== Add comment =====
function addComment(dealId, input) {
  const text = input.value.trim();
  if (!text) return;
  const deal = deals.find(d => d.id === dealId);
  if (!deal) return;
  deal.comments.push({ author: 'You', time: 'Just now', body: text });
  input.value = '';
  openDetail(dealId);
  // Scroll to bottom of comments
  setTimeout(() => {
    const body = document.getElementById('detail-body');
    body.scrollTop = body.scrollHeight;
  }, 50);
}

// ===== Status change =====
function setDealStatus(dealId, newStatus) {
  const deal = deals.find(d => d.id === dealId);
  if (!deal) return;

  const statusMap = {
    approved: { label: 'Approved', urgency: 'urgency-green', slaText: 'Completed', slaClass: 'sla-done' },
    rejected: { label: 'Rejected', urgency: 'urgency-muted', slaText: 'Completed', slaClass: 'sla-done' },
    changes:  { label: 'Changes Requested', urgency: 'urgency-purple', slaText: deal.slaText, slaClass: deal.slaClass }
  };

  const s = statusMap[newStatus];
  deal.status = newStatus;
  deal.statusLabel = s.label;
  deal.urgencyClass = s.urgency;
  deal.slaText = s.slaText;
  deal.slaClass = s.slaClass;

  // Update approval chain first reviewer status
  if (newStatus === 'approved') {
    deal.approvalChain.forEach(a => {
      if (a.status === 'pending') { a.status = 'approved'; a.statusClass = 'node-approved'; a.textClass = 'text-approved'; }
    });
  } else if (newStatus === 'rejected') {
    deal.approvalChain.forEach(a => {
      if (a.status === 'pending') { a.status = 'rejected'; a.statusClass = 'node-rejected'; a.textClass = 'text-rejected'; }
    });
  } else if (newStatus === 'changes') {
    deal.approvalChain.forEach(a => {
      if (a.status === 'pending') { a.status = 'changes'; a.statusClass = 'node-rejected'; a.textClass = 'text-rejected'; }
    });
  }

  // Update badge counts
  updateBadges();
  openDetail(dealId);
}

// ===== Badge counts =====
function updateBadges() {
  const counts = { all: deals.length, pending: 0, approved: 0, rejected: 0, changes: 0 };
  deals.forEach(d => { if (counts[d.status] !== undefined) counts[d.status]++; });
  document.getElementById('badge-all').textContent = counts.all;
  document.getElementById('badge-pending').textContent = counts.pending;
  document.getElementById('badge-approved').textContent = counts.approved;
  document.getElementById('badge-rejected').textContent = counts.rejected;
  document.getElementById('badge-changes').textContent = counts.changes;

  // Update overdue count
  const overdueCount = deals.filter(d => d.slaClass === 'sla-overdue').length;
  const slaWarning = document.querySelector('.toolbar-stat.sla-warning');
  if (overdueCount > 0) {
    slaWarning.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${overdueCount} Overdue`;
    slaWarning.style.display = '';
  } else {
    slaWarning.style.display = 'none';
  }
}

// ===== Keyboard =====

  if (e.key === 'Escape') closeDetail();
});
